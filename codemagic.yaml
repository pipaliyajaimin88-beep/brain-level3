workflows:
  android-build:
    name: BrainLevel Android APK
    max_build_duration: 60
    instance_type: mac_mini_m1
    environment:
      java: 17
      node: 20
    scripts:
      - name: Setup Project
        script: |
          chmod +x setup.sh
          bash setup.sh

      - name: Build APK
        script: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon --max-workers 2

    artifacts:
      - android/app/build/outputs/apk/debug/app-debug.apk
