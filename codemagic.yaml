workflows:
  android-build:
    artifacts:
    - android/app/build/outputs/apk/debug/app-debug.apk
    environment:
      java: 17
      node: 20
    instance_type: mac_mini_m1
    max_build_duration: 60
    name: BrainLevel Android APK
    scripts:
    - name: Setup Project
      script: "cat > package.json << 'EOF'\n{\"name\":\"brainlevel\",\"version\":\"1.0.0\",\"dependencies\":{\"@capacitor/android\":\"5.7.4\",\"@capacitor/cli\":\"5.7.4\",\"@capacitor/core\":\"5.7.4\"}}\nEOF\ncat > capacitor.config.json << 'EOF'\n{\"appId\":\"com.brainlevel.game\",\"appName\":\"BrainLevel\",\"webDir\":\"www\"}\nEOF\nmkdir -p www\nfor f in index.html game-logic.js styles.css levels.json manifest.json; do\n  [ -f \"$f\" ] && cp \"$f\" www/ || true\ndone\nnpm install --legacy-peer-deps\nnpm install -g @capacitor/cli@5.7.4\nrm -rf android\nnpx cap add android\nnpx cap sync android\nmkdir -p android/app\nprintf \"include ':capacitor-android'\\nproject(':capacitor-android').projectDir = new File('../node_modules/@capacitor/android/capacitor')\\n\" > android/capacitor.settings.gradle\nprintf \"dependencies {}\\n\" > android/app/capacitor.build.gradle\nprintf \"ext {\\n  minSdkVersion = 22\\n  compileSdkVersion = 34\\n  targetSdkVersion = 34\\n  androidxActivityVersion = '1.8.0'\\n  androidxAppCompatVersion = '1.6.1'\\n  androidxCoreVersion = '1.12.0'\\n  androidxFragmentVersion = '1.6.2'\\n  junitVersion = '4.13.2'\\n  androidxJunitVersion = '1.1.5'\\n  androidxEspressoCoreVersion = '3.5.1'\\n}\\n\" > android/variables.gradle\nprintf \"org.gradle.jvmargs=-Xmx1536m\\norg.gradle.daemon=false\\nandroid.useAndroidX=true\\nandroid.enableJetifier=true\\n\" > android/gradle.properties\necho \"ALL FILES CREATED\"\nls -la android/\nls -la android/app/\n"
    - name: Build APK
      script: 'cd android

        chmod +x gradlew

        ./gradlew assembleDebug --no-daemon --max-workers 2

        '
