workflows:
  android-build:
    name: BrainLevel Android APK
    max_build_duration: 60
    instance_type: mac_mini_m1
    environment:
      java: 17
      node: 20
    scripts:
      - name: Setup project files
        script: |
          set -e
          echo '{"name":"brainlevel","version":"1.0.0","dependencies":{"@capacitor/android":"6.0.0","@capacitor/cli":"6.0.0","@capacitor/core":"6.0.0"}}' > package.json
          echo '{"appId":"com.brainlevel.game","appName":"BrainLevel","webDir":"www"}' > capacitor.config.json
          mkdir -p www
          [ -f index.html ] && cp index.html www/
          [ -f game-logic.js ] && cp game-logic.js www/
          [ -f styles.css ] && cp styles.css www/
          [ -f levels.json ] && cp levels.json www/
          [ -f manifest.json ] && cp manifest.json www/

      - name: Install dependencies
        script: |
          set -e
          npm install --legacy-peer-deps
          npm install -g @capacitor/cli@6.0.0

      - name: Add Android and Sync
        script: |
          set -e
          rm -rf android
          npx cap add android
          npx cap sync android

      - name: Build APK
        script: |
          set -e
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon

    artifacts:
      - android/app/build/outputs/apk/debug/app-debug.apk
