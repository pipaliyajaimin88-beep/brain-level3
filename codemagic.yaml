workflows:
  android-build:
    artifacts:
    - android/app/build/outputs/apk/debug/app-debug.apk
    environment:
      java: 17
      node: 20
    instance_type: mac_mini_m1
    max_build_duration: 60
    name: BrainLevel Android APK
    scripts:
    - name: Setup Project
      script: "cat > package.json << 'EOF'\n{\"name\":\"brainlevel\",\"version\":\"1.0.0\",\"dependencies\":{\"@capacitor/android\":\"5.7.4\",\"@capacitor/cli\":\"5.7.4\",\"@capacitor/core\":\"5.7.4\"}}\nEOF\ncat > capacitor.config.json << 'EOF'\n{\"appId\":\"com.brainlevel.game\",\"appName\":\"BrainLevel\",\"webDir\":\"www\"}\nEOF\nmkdir -p www\nfor f in index.html game-logic.js styles.css levels.json manifest.json; do\n  [ -f \"$f\" ] && cp \"$f\" www/ || true\ndone\nnpm install --legacy-peer-deps\nnpm install -g @capacitor/cli@5.7.4\nrm -rf android\nnpx cap add android\nnpx cap sync android\nmkdir -p android/app\nprintf \"include ':capacitor-android'\\nproject(':capacitor-android').projectDir = new File('../node_modules/@capacitor/android/capacitor')\\n\" > android/capacitor.settings.gradle\nprintf \"dependencies {}\\n\" > android/app/capacitor.build.gradle\ncat > android/variables.gradle << 'VARS'\next {\n  minSdkVersion = 22\n  compileSdkVersion = 34\n  targetSdkVersion = 34\n  androidxActivityVersion = '1.8.0'\n  androidxAppCompatVersion = '1.6.1'\n  androidxCoordinatorLayoutVersion = '1.2.0'\n  androidxCoreVersion = '1.12.0'\n  androidxFragmentVersion = '1.6.2'\n  junitVersion = '4.13.2'\n  androidxJunitVersion = '1.1.5'\n  androidxEspressoCoreVersion = '3.5.1'\n  cordovaAndroidVersion = '10.1.1'\n}\nVARS\ncat > android/gradle.properties << 'PROPS'\norg.gradle.jvmargs=-Xmx2048m -XX:MaxMetaspaceSize=512m\norg.gradle.daemon=false\norg.gradle.parallel=false\nandroid.useAndroidX=true\nandroid.enableJetifier=true\nPROPS\necho \"ALL FILES CREATED SUCCESSFULLY\"\n"
    - name: Build APK
      script: 'cd android

        chmod +x gradlew

        ./gradlew assembleDebug --no-daemon --max-workers 2

        '
