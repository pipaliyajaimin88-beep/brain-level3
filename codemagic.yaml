workflows:
  android-build:
    name: BrainLevel Android APK
    max_build_duration: 60
    instance_type: mac_mini_m1
    environment:
      java: 17
      node: 22
    scripts:
      - name: Install dependencies
        script: npm install --legacy-peer-deps
      - name: Install Capacitor CLI
        script: npm install -g @capacitor/cli@5.7.4
      - name: Sync www to android
        script: npx cap sync android
      - name: Force Java 17 everywhere
        script: |
          cd android
          find . -name "build.gradle" -exec sed -i.bak 's/JavaVersion.VERSION_21/JavaVersion.VERSION_17/g' {} \;
          find . -name "build.gradle" -exec sed -i.bak 's/JavaVersion.VERSION_2[0-9]/JavaVersion.VERSION_17/g' {} \;
          echo "org.gradle.java.home=$JAVA_HOME" >> gradle.properties
          cat gradle.properties
      - name: Build APK
        script: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon --max-workers 2
    artifacts:
      - android/app/build/outputs/apk/debug/app-debug.apk
