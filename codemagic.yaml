workflows:
  android-build:
    name: BrainLevel Android APK
    max_build_duration: 60
    instance_type: mac_mini_m1
    environment:
      java: 17
      node: 20
    scripts:
      - name: Setup project files
        script: |
          node -e "
          const fs = require('fs');
          fs.writeFileSync('package.json', JSON.stringify({
            name: 'brainlevel',
            version: '1.0.0',
            dependencies: {
              '@capacitor/android': '6.0.0',
              '@capacitor/cli': '6.0.0',
              '@capacitor/core': '6.0.0'
            }
          }, null, 2));
          fs.writeFileSync('capacitor.config.json', JSON.stringify({
            appId: 'com.brainlevel.game',
            appName: 'BrainLevel',
            webDir: 'www'
          }, null, 2));
          fs.mkdirSync('www', {recursive: true});
          ['index.html','game-logic.js','styles.css','levels.json','manifest.json'].forEach(f => {
            try { fs.copyFileSync(f, 'www/' + f); } catch(e) {}
          });
          console.log('Setup done');
          "

      - name: Install dependencies
        script: |
          npm install --legacy-peer-deps
          npm install -g @capacitor/cli@6.0.0
          echo "Install done"

      - name: Add Android and Sync
        script: |
          rm -rf android
          npx cap add android
          npx cap sync android
          echo "Sync done"

      - name: Build APK
        script: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon

    artifacts:
      - android/app/build/outputs/apk/debug/app-debug.apk
